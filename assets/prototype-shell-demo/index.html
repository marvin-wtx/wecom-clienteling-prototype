<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WeCom Clienteling Prototype Shell</title>
  <style>
    :root {
      --phone-w: 390px;
      --phone-h: 844px;
      --top-h: 88px;
      --status-h: 38px;
      --tab-h: 64px;
      --desktop-phone-scale: 1;
      --bg: #f5f6f4;
      --surface: #ffffff;
      --surface-soft: #eef2ef;
      --line: #dfe4df;
      --line-strong: #bcc6bf;
      --text: #1c211f;
      --muted: #68726c;
      --subtle: #8d9690;
      --brand-primary: #4f6d63;
      --brand-primary-strong: #304e45;
      --brand-accent: #80653f;
      --brand-on-primary: #ffffff;
      --brand-danger: #9b3c30;
      --brand: var(--brand-primary);
      --brand-strong: var(--brand-primary-strong);
      --accent: var(--brand-accent);
      --danger: var(--brand-danger);
      --shadow: 0 18px 52px rgba(28, 33, 31, 0.16);
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #eef0ed; color: var(--text); }
    button, input, select { font: inherit; }
    button { border: 0; background: transparent; color: inherit; cursor: pointer; }

    .stage {
      min-height: 100vh;
      height: 100vh;
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .stage-header, .stage-controls {
      width: min(920px, 100%);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stage-title strong { display: block; font-size: 15px; line-height: 1.3; }
    .stage-title span { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }

    .stage-controls {
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(14px);
      flex-wrap: wrap;
    }

    .control-group { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .control-label { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .select, .stage-btn {
      height: 29px;
      border: 1px solid var(--line-strong);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text);
      padding: 0 9px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      font-size: 11px;
    }
    .select:disabled, .stage-btn:disabled { opacity: .45; cursor: not-allowed; }

    .phone-wrap { position: relative; flex: 0 0 auto; width: var(--phone-w); height: var(--phone-h); min-height: 0; }
    .phone {
      position: absolute;
      left: 50%;
      top: 0;
      width: var(--phone-w);
      height: var(--phone-h);
      transform: translateX(-50%) scale(var(--desktop-phone-scale));
      transform-origin: top center;
      border: 1px solid #242926;
      border-radius: 38px;
      background: var(--bg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .phone::before {
      content: "";
      position: absolute;
      z-index: 16;
      left: 50%;
      top: 0;
      width: 110px;
      height: 22px;
      transform: translateX(-50%);
      border-radius: 0 0 14px 14px;
      background: #111;
      pointer-events: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 38px;
      background: var(--bg);
    }

    .statusbar {
      position: absolute;
      z-index: 15;
      top: 0;
      left: 0;
      right: 0;
      height: var(--status-h);
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      pointer-events: none;
    }
    .status-network { font-size: 14px; font-weight: 700; letter-spacing: 0; }

    .app-page { position: relative; height: 100%; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

    .wx-nav {
      height: var(--top-h);
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 3;
      flex: 0 0 auto;
    }
    .wx-nav-left {
      position: absolute;
      left: 0;
      top: var(--status-h);
      width: 88px;
      height: calc(var(--top-h) - var(--status-h));
      padding: 0 0 0 24px;
      display: flex;
      align-items: center;
      color: var(--text);
      z-index: 1;
    }
    .wx-nav-left::before {
      content: "";
      display: block;
      width: 9px;
      height: 9px;
      border-left: 1.6px solid currentColor;
      border-bottom: 1.6px solid currentColor;
      transform: rotate(45deg);
    }
    .wx-nav-left.placeholder { visibility: hidden; }
    .wx-nav-title {
      position: absolute;
      left: 50%;
      top: var(--status-h);
      width: calc(100% - 292px);
      max-width: 190px;
      height: calc(var(--top-h) - var(--status-h));
      line-height: calc(var(--top-h) - var(--status-h));
      transform: translateX(-50%);
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .wx-nav > .wx-capsule {
      position: absolute;
      right: 8px;
      top: calc(var(--status-h) + (var(--top-h) - var(--status-h)) / 2);
      transform: translateY(-50%);
      z-index: 1;
    }
    .wx-capsule {
      width: 88px;
      height: 32px;
      border: .5px solid rgba(0, 0, 0, .1);
      border-radius: 16px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .wx-capsule-dot, .wx-capsule-circle {
      flex: 1;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .wx-capsule-dot::before {
      content: "";
      width: 12px;
      height: 4px;
      background: radial-gradient(circle 1.5px at 50% 50%, #000 100%, transparent 100%);
      background-size: 4px 4px;
      background-repeat: repeat-x;
      background-position: 0 50%;
    }
    .wx-capsule-line { width: 1px; height: 18px; background: rgba(0, 0, 0, .1); flex-shrink: 0; }
    .wx-capsule-circle::before {
      content: "";
      display: block;
      width: 16px;
      height: 16px;
      border: 1.5px solid #000;
      border-radius: 50%;
    }
    .wx-capsule-circle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 6px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #000;
    }

    .body {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 14px calc(var(--tab-h) + env(safe-area-inset-bottom) + 18px);
      scrollbar-width: none;
    }
    .body::-webkit-scrollbar { display: none; }
    .body.no-tab { padding-bottom: calc(env(safe-area-inset-bottom) + 18px); }
    .app-page.has-actions .body { padding-bottom: calc(var(--tab-h) + 88px + env(safe-area-inset-bottom)); }
    .app-page.has-actions .body.no-tab { padding-bottom: calc(104px + env(safe-area-inset-bottom)); }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 24;
      min-height: var(--tab-h);
      padding-bottom: env(safe-area-inset-bottom);
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(16px);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }
    .tab {
      min-width: 0;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .tab.active { color: var(--brand); }
    svg {
      width: 1em;
      height: 1em;
      display: block;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .tab .tab-ic { font-size: 22px; }
    .tab.center .tab-ic {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--brand);
      font-size: 20px;
    }

    .hero {
      margin: -14px -14px 14px;
      padding: 24px 18px 20px;
      color: #fff;
      background: linear-gradient(135deg, #5b6c61 0%, #315f6c 100%);
    }
    .hero-kicker { color: rgba(255,255,255,.76); font-size: 12px; font-weight: 700; }
    .hero-main { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-top: 8px; }
    .hero h1 { margin: 0; font-size: 24px; line-height: 1.18; letter-spacing: 0; }
    .role-chip { width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center; border: 1px solid rgba(255,255,255,.34); background: rgba(255,255,255,.18); font-weight: 800; }
    .stat-row { margin-top: 18px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat { min-width: 0; border-radius: 8px; padding: 12px 8px; background: rgba(255,255,255,.18); text-align: center; }
    .stat strong { display: block; font-size: 21px; line-height: 1.2; }
    .stat span { display: block; margin-top: 5px; font-size: 11px; color: rgba(255,255,255,.82); }

    .section { margin-top: 14px; }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .section-head h2 { margin: 0; color: var(--muted); font-size: 15px; line-height: 1.3; }
    .section-link { color: var(--brand-strong); font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 2px; white-space: nowrap; }
    .meta, .small { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .card { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); box-shadow: 0 1px 2px rgba(28,33,31,.04); }

    .client-card {
      padding: 14px;
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 10px;
      text-align: left;
      width: 100%;
    }
    .avatar { width: 46px; height: 46px; border-radius: 50%; display: grid; place-items: center; color: #fff; background: var(--brand); font-weight: 800; }
    .client-card h3, .task-card h3, .detail-title { margin: 0; font-size: 17px; line-height: 1.25; letter-spacing: 0; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .badge {
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      color: var(--brand-strong);
      background: var(--surface-soft);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
    }

    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
    .search {
      flex: 1;
      min-width: 0;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 11px;
      color: var(--muted);
    }
    .search input { min-width: 0; flex: 1; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 13px; }
    .filter-btn, .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .pill {
      flex: 0 0 auto;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .pill.active { border-color: var(--brand); color: var(--brand-strong); background: #edf4ef; }

    .detail-head { padding: 14px; margin-bottom: 12px; }
    .kv-grid { display: grid; grid-template-columns: 86px minmax(0, 1fr); gap: 8px 10px; margin-top: 12px; font-size: 12px; }
    .kv-grid span:nth-child(odd) { color: var(--muted); }
    .timeline { display: grid; gap: 10px; padding: 14px; }
    .timeline-row { display: grid; grid-template-columns: 76px minmax(0, 1fr); gap: 8px; font-size: 12px; color: var(--muted); }
    .timeline-row strong { color: var(--text); font-size: 13px; }

    .task-card { padding: 14px; margin-bottom: 10px; text-align: left; width: 100%; }
    .task-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .progress { height: 6px; border-radius: 6px; overflow: hidden; background: var(--surface-soft); margin-top: 12px; }
    .progress i { display: block; width: var(--p, 0%); height: 100%; background: var(--brand); }

    .action-row { display: flex; gap: 10px; margin-top: 12px; }
    .primary, .secondary {
      min-height: 42px;
      border-radius: 8px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      font-weight: 800;
      font-size: 13px;
    }
    .primary { flex: 1; background: var(--brand); color: #fff; }
    .secondary { background: var(--surface); border: 1px solid var(--line); color: var(--brand-strong); }
    .disabled-note { padding: 11px 12px; border: 1px solid var(--line); border-radius: 8px; color: var(--muted); background: var(--surface-soft); font-size: 12px; line-height: 1.45; }

    .filter-layout { display: grid; grid-template-columns: 96px minmax(0, 1fr); min-height: 420px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--surface); }
    .filter-side { background: var(--surface-soft); border-right: 1px solid var(--line); }
    .filter-side button { width: 100%; min-height: 42px; padding: 0 10px; text-align: left; color: var(--muted); font-size: 12px; font-weight: 700; }
    .filter-side button.active { color: var(--brand-strong); background: #fff; }
    .filter-pane { padding: 12px; display: grid; align-content: start; gap: 8px; }
    .filter-option { min-height: 38px; border: 1px solid var(--line); border-radius: 7px; padding: 0 10px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
    .filter-option.active { border-color: var(--brand); color: var(--brand-strong); background: #edf4ef; font-weight: 800; }
    .sticky-actions {
      position: absolute;
      z-index: 26;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(245, 246, 244, .94);
      backdrop-filter: blur(16px);
      display: flex;
      gap: 10px;
    }
    .app-page.has-tabbar .sticky-actions { bottom: var(--tab-h); }

    .appt-row {
      padding: 13px;
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 10px;
      text-align: left;
      width: 100%;
    }
    .time { color: var(--brand-strong); font-weight: 800; font-size: 13px; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .metric-card { padding: 13px; }
    .metric-card strong { display: block; margin-top: 6px; font-size: 21px; line-height: 1.2; }

    .manager-period-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .manager-period-copy { min-width: 0; }
    .manager-period-label { color: var(--muted); font-size: 11px; font-weight: 800; }
    .manager-period-meta { margin-top: 3px; color: var(--subtle); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .manager-period-pills { flex: 0 0 auto; display: flex; gap: 3px; padding: 3px; border-radius: 999px; background: var(--surface-soft); }
    .manager-period-pills button { min-width: 34px; height: 24px; border-radius: 999px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .manager-period-pills button.active { background: var(--text); color: #fff; }
    .manager-card { padding: 14px; margin-bottom: 10px; }
    .manager-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 11px; }
    .manager-card-title { font-size: 15px; font-weight: 800; }
    .manager-card-meta { color: var(--subtle); font-size: 11px; white-space: nowrap; }
    .manager-split { display: grid; grid-template-columns: 90px minmax(0, 1fr); gap: 12px; align-items: center; }
    .manager-ring { --pdeg: 0deg; width: 76px; height: 76px; border-radius: 50%; display: grid; place-items: center; background: conic-gradient(var(--brand) var(--pdeg), var(--surface-soft) 0); position: relative; }
    .manager-ring::after { content: ""; position: absolute; inset: 11px; border-radius: 50%; background: var(--surface); }
    .manager-ring strong { position: relative; z-index: 1; font-size: 18px; line-height: 1; }
    .manager-ring-note { margin-top: 6px; color: var(--subtle); font-size: 10px; text-align: center; line-height: 1.25; }
    .manager-mini-list { display: grid; gap: 7px; }
    .manager-mini-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 12px; }
    .manager-mini-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .manager-mini-row strong { color: var(--text); font-size: 13px; }
    .manager-pair-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 12px; border-top: 1px solid var(--line); }
    .manager-pair { padding: 10px 8px 0; border-right: 1px solid var(--line); text-align: center; }
    .manager-pair:last-child { border-right: 0; }
    .manager-pair strong { display: block; font-size: 16px; }
    .manager-pair span { display: block; margin-top: 4px; color: var(--subtle); font-size: 10px; line-height: 1.25; }
    .staff-entry { width: 100%; min-height: 70px; margin-top: 2px; border-radius: 8px; padding: 14px; background: var(--text); color: #fff; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .staff-entry span { display: block; margin-top: 4px; color: rgba(255,255,255,.68); font-size: 11px; line-height: 1.35; }
    .staff-entry svg { flex: 0 0 auto; width: 18px; height: 18px; }
    .staff-tabs { display: flex; gap: 8px; overflow-x: auto; margin: -2px -14px 12px; padding: 0 14px 10px; border-bottom: 1px solid var(--line); scrollbar-width: none; }
    .staff-tabs::-webkit-scrollbar { display: none; }
    .staff-tabs button { flex: 0 0 auto; height: 32px; border: 1px solid var(--line); border-radius: 999px; padding: 0 12px; color: var(--muted); background: var(--surface); font-size: 12px; font-weight: 800; }
    .staff-tabs button.active { border-color: var(--text); background: var(--text); color: #fff; }
    .staff-board { display: grid; gap: 10px; }
    .staff-section { padding: 14px; }
    .staff-section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .staff-section-head b { font-size: 15px; }
    .staff-section-head span { color: var(--subtle); font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .staff-sales-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .staff-primary { min-height: 118px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .staff-primary-label { color: var(--subtle); font-size: 10px; font-weight: 800; }
    .staff-primary-main { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .staff-primary-main .manager-ring { width: 62px; height: 62px; }
    .staff-primary-main .manager-ring::after { inset: 9px; }
    .staff-value strong { display: block; font-size: 16px; line-height: 1.15; white-space: nowrap; }
    .staff-value span { display: block; margin-top: 5px; color: var(--muted); font-size: 10px; line-height: 1.3; }
    .staff-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
    .staff-mini { padding: 10px 8px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .staff-mini strong { display: block; font-size: 14px; }
    .staff-mini span { display: block; margin-top: 4px; color: var(--subtle); font-size: 10px; }
    .staff-progress-grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .staff-progress-tile { min-width: 0; padding: 11px 8px; border-right: 1px solid var(--line); background: #fff; }
    .staff-progress-tile:last-child { border-right: 0; }
    .staff-progress-tile span { display: block; color: var(--subtle); font-size: 10px; line-height: 1.2; }
    .staff-progress-tile strong { display: block; margin-top: 5px; font-size: 15px; }
    .staff-progress-track { height: 5px; border-radius: 999px; background: var(--surface-soft); margin: 8px 0 6px; overflow: hidden; }
    .staff-progress-track i { display: block; height: 100%; width: var(--p, 0%); background: var(--brand); }
    .staff-data-layout { display: grid; grid-template-columns: minmax(0, 1fr) 92px; gap: 10px; }
    .staff-data-list { border-top: 1px solid var(--line); }
    .staff-data-row { min-height: 34px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; }

    function detectViewportMode() {
      const view = params.get("view");
      const requestedMobile = view === "mobile";
      const requestedDesktop = view === "desktop";
      const autoMobile = /iPhone|iPad|iPod|Android|Mobile|HarmonyOS|WeChat/i.test(navigator.userAgent) || window.innerWidth < 768;
      document.body.classList.toggle("desktop", requestedDesktop);
      document.body.classList.toggle("mobile", requestedMobile || (!requestedDesktop && autoMobile));
    }

    function fitDesktopPhone() {
      const wrap = document.querySelector(".phone-wrap");
      if (document.body.classList.contains("mobile")) {
        document.documentElement.style.setProperty("--desktop-phone-scale", "1");
        if (wrap) { wrap.style.width = "100vw"; wrap.style.height = "100dvh"; }
        return;
      }
      const header = document.querySelector(".stage-header");
      const controls = document.querySelector(".stage-controls");
      const usedHeight = (header ? header.offsetHeight : 0) + (controls ? controls.offsetHeight : 0) + 40;
      const availableHeight = Math.max(180, window.innerHeight - usedHeight);
      const availableWidth = Math.max(280, Math.min(920, window.innerWidth - 32));
      const scale = Math.max(0.25, Math.min(1, availableHeight / 844, availableWidth / 390));
      document.documentElement.style.setProperty("--desktop-phone-scale", String(scale));
      if (wrap) { wrap.style.width = (390 * scale) + "px"; wrap.style.height = (844 * scale) + "px"; }
    }

        back: true,
        showTabbar: false,
        body: '<section class="card detail-head" data-info-capability="schedule"><h1 class="detail-title">' + appt.service + '</h1><div class="kv-grid"><span>日期与时间</span><strong>今日 ' + appt.time + ' - 11:30</strong><span>状态</span><strong>' + appt.status + '</strong><span>确认状态</span><strong>待客户确认</strong></div></section><section class="section" data-info-capability="people-place">' + sectionHead("客户与接待", "") + '<div class="card kv-grid"><span>客户</span><strong>' + customer.name + '</strong><span>负责人</span><strong>' + appt.owner + '</strong><span>门店/地点</span><strong>当前门店 · 客户服务区</strong></div></section><section class="section" data-info-capability="service-resource">' + sectionHead("服务与资源", "") + '<div class="card kv-grid"><span>服务内容</span><strong>' + appt.service + '</strong><span>资源</span><strong>顾问时段已预留 · 无冲突</strong><span>准备事项</span><strong>按客户偏好准备产品与尺码</strong></div></section><section class="section" data-info-capability="customer-context">' + sectionHead("客户背景", "") + '<div class="card kv-grid"><span>客户偏好</span><strong>' + customer.preference + '</strong><span>关联任务</span><strong>' + customer.next + '</strong><span>最近互动</span><strong>' + customer.last + '</strong></div></section><section class="section" data-info-capability="preparation-communication">' + sectionHead("准备与沟通", "") + '<div class="card kv-grid"><span>预约备注</span><strong>' + appt.note + '</strong><span>确认方式</span><strong>企微消息 · 尚未发送</strong><span>接待清单</span><strong>确认需求、资源与到店时间</strong></div></section><section class="section" data-info-capability="outcome-follow-up">' + sectionHead("结果与后续", "") + '<div class="card kv-grid"><span>可选结果</span><strong>已到店 / 已完成 / 未到店 / 已取消</strong><span>后续动作</span><strong>记录服务结果并生成下一跟进</strong></div></section><div class="sticky-actions" data-info-capability="actions-exceptions"><button class="secondary" type="button" data-toast="已发送预约确认">发送确认</button><button class="primary" type="button" data-toast="请选择到店结果并填写备注">回填结果</button></div>'
      });
    }

    function appointmentNewPage() {
      const client = customerById(state.selectedClient);
      return appShell({
        title: "新建预约",
        back: true,
        showTabbar: false,
        body: '<section class="card detail-head"><h1 class="detail-title">预约信息</h1><div class="kv-grid"><span>客户</span><strong>' + client.name + '</strong><span>服务内容</span><strong>到店体验 / 咨询</strong><span>门店时间</span><strong>今日 16:30</strong><span>确认方式</span><strong>企微消息</strong></div></section><section class="section">' + sectionHead("冲突校验", "") + '<div class="disabled-note">当前时间段可用。若资源不可用，应展示冲突原因并提供重选入口。</div></section><div class="sticky-actions"><button class="secondary" type="button" data-back>取消</button><button class="primary" type="button" data-toast="预约已创建并生成跟进记录">创建预约</button></div>'
      });
    }

    function dashboardPage() {
      const manager = state.role !== "frontline";
      const term = frontlineTerm();
      const data = managerData();
      const staffPreview = staffPerformanceRows.slice(0, 3).map((staff) => '<button class="card task-card" type="button" data-staff-performance="' + staff.id + '"><div class="task-top"><div><h3>' + staff.name + ' · ' + staff.scope + '</h3><div class="meta" style="margin-top:6px">销售 ' + staff.sales.toLocaleString() + ' · 任务 ' + staff.completed + '/' + staff.tasks + ' · 企微绑定 ' + staff.binding + '%</div></div><span class="section-link">' + term + '表现 ' + icon("chevron") + '</span></div><div class="progress"><i style="--p:' + staff.target + '%"></i></div><div class="meta" style="display:flex;justify-content:space-between;margin-top:8px"><span>目标达成 ' + staff.target + '%</span><span>待协助 ' + Math.max(0, staff.tasks - staff.completed) + '</span></div></button>').join("");
      const body = manager
        ? '<section class="card detail-head"><div class="task-top"><div><h1 class="detail-title">管理层视图</h1><div class="meta" style="margin-top:6px">' + managerScopeText() + ' · 按经营周期查看销售、客户运营、邀约、任务和企微连接。</div></div><span class="badge">' + activeRoleLabel() + '</span></div></section><div class="manager-period-row"><div class="manager-period-copy"><div class="manager-period-label">经营周期</div><div class="manager-period-meta">数据截至今日 · ' + managerPeriodLabel(state.managerPeriod) + '</div></div>' + managerPeriodPills() + '</div>' + managerDashboardCard("销售表现", "经营贡献", data.target, [["销售额", data.sales], ["日均销售额", data.dailySales], ["订单数", data.orders]], [[data.basket, "客单价"], [data.unit, "连带件数"]], "目标达成率") + managerDashboardCard("客户运营", "客户发展", data.newRate, [["新增客户", data.newCustomers], ["复购/回流客户", data.returning]], [[data.newRate + "%", "新增达成"], [data.returnRate + "%", "回流达成"]], "客户运营进度") + managerDashboardCard("到店邀约", "预约转化", data.conversion, [["已到店", data.arrived], ["销售贡献", data.contribution], ["待到店", data.coming]], [], "转化率") + managerDashboardCard("任务完成", "团队执行", data.completion, [["已完成", data.completed], ["待完成", data.toComplete]], [], "完成率") + managerDashboardCard("企微运营", "客户连接", data.binding, [["新增联系人", data.contacts], ["流失/删除", data.lost], ["触达次数", data.outreach]], [[data.reply, "回复率"]], "绑定率") + '<section class="section">' + sectionHead("按" + term + "表现", "staffPerformance") + staffPreview + '</section><button class="staff-entry" type="button" data-route="staffPerformance"><div><strong>' + term + '表现明细</strong><span>查看当前周期内销售、客户、邀约、任务和企微表现。</span></div>' + icon("chevron") + '</button>'
        : '<section class="metric-grid"><article class="card metric-card"><span class="meta">任务完成率</span><strong>72%</strong></article><article class="card metric-card"><span class="meta">触达客户</span><strong>186</strong></article><article class="card metric-card"><span class="meta">预约转化</span><strong>24%</strong></article><article class="card metric-card"><span class="meta">内容使用</span><strong>43</strong></article></section>';
      return appShell({
        title: manager ? "管理看板" : "看板",
        back: true,
        tab: "__tool",
        body
      });
    }

    function staffPerformancePage() {
      if (state.role === "frontline") {
        return appShell({
          title: "顾问表现",
          back: true,
          showTabbar: false,
          body: '<div class="disabled-note">当前角色无管理看板权限。请切换到店长或总部视角查看该结构页。</div>'
        });
      }
      const term = frontlineTerm();
      const staff = staffById(state.selectedStaff);
      const taskRate = Math.round(staff.completed / staff.tasks * 100);
      const pending = Math.max(0, staff.tasks - staff.completed);
      const tabs = '<div class="staff-tabs">' + staffPerformanceRows.map((row) => '<button type="button" class="' + (row.id === staff.id ? "active" : "") + '" data-staff-performance="' + row.id + '">' + row.name + '</button>').join("") + '</div>';
      const header = '<section class="card detail-head"><div class="task-top"><div><h1 class="detail-title">' + staff.name + '</h1><div class="meta" style="margin-top:6px">' + staff.scope + ' · ' + managerPeriodLabel(state.managerPeriod) + ' · ' + term + '表现</div></div><span class="badge">' + activeRoleLabel() + '</span></div></section><div class="manager-period-row"><div class="manager-period-copy"><div class="manager-period-label">经营周期</div><div class="manager-period-meta">随管理看板周期联动</div></div>' + managerPeriodPills() + '</div>';
      const sales = '<section class="card staff-section"><div class="staff-section-head"><b>销售表现</b><span>Sales KPIs</span></div><div class="staff-sales-grid"><div class="staff-primary"><div class="staff-primary-label">销售进度</div><div class="staff-primary-main"><div class="manager-ring" style="--pdeg:' + staff.target * 3.6 + 'deg"><strong>' + staff.target + '%</strong></div><div class="staff-value"><strong>¥' + staff.sales.toLocaleString() + '</strong><span>销售额<br>目标达成率</span></div></div></div><div class="staff-primary"><div class="staff-primary-label">日均贡献</div><div class="staff-value" style="margin-top:18px"><strong>' + staff.basket + '</strong><span>客单价<br>' + staff.orders + ' 个订单</span></div></div></div><div class="staff-mini-grid">' + staffMini("订单数", staff.orders) + staffMini("连带件数", staff.unit) + staffMini("目标达成", staff.target + "%") + '</div></section>';
      const customer = '<section class="card staff-section"><div class="staff-section-head"><b>客户运营</b><span>Client Development</span></div><div class="staff-progress-grid">' + staffProgress("新增客户", staff.newCustomers, staff.newRate, "目标达成 " + staff.newRate + "%") + staffProgress("复购/回流", staff.returning, staff.returnRate, "目标达成 " + staff.returnRate + "%") + staffProgress("企微绑定率", staff.binding + "%", staff.binding, "客户连接") + '</div></section>';
      const appointment = '<section class="card staff-section"><div class="staff-section-head"><b>到店邀约</b><span>Appointment</span></div><div class="staff-data-layout"><div class="staff-data-list">' + staffDataRow("已到店邀约", staff.arrived) + staffDataRow("转化率", staff.conversion + "%") + staffDataRow("销售贡献", staff.contribution) + '</div><div class="staff-focus-card"><strong>' + staff.coming + '</strong><span>待到店邀约</span></div></div></section>';
      const operation = '<section class="card staff-section"><div class="staff-section-head"><b>任务与企微运营</b><span>Execution</span></div><div class="staff-operation-grid"><div class="staff-task-block"><div class="staff-block-label">任务完成</div><div class="staff-task-content"><div class="manager-ring" style="--pdeg:' + taskRate * 3.6 + 'deg"><strong>' + taskRate + '%</strong></div><div class="staff-task-list"><div><span>已完成</span><strong>' + staff.completed + '</strong></div><div><span>待完成</span><strong>' + pending + '</strong></div></div></div></div><div class="staff-wecom-block"><div class="staff-block-label">企微运营</div><div class="staff-wecom-grid"><div><span>新增联系人</span><strong>' + staff.contacts + '</strong></div><div><span>流失/删除</span><strong>' + staff.lost + '</strong></div><div><span>触达次数</span><strong>' + staff.outreach + '</strong></div><div><span>回复率</span><strong>' + staff.reply + '</strong></div></div></div></div></section>';
      return appShell({
        title: term + "表现",
        back: true,
        showTabbar: false,
        body: tabs + header + '<div class="staff-board">' + sales + customer + appointment + operation + '</div>'
      });
    }

    function contentPage() {
      return appShell({
        title: "素材库",
        back: true,
        showTabbar: false,
        body: '<div class="toolbar"><label class="search">' + icon("search") + '<input placeholder="搜索素材名称、活动、标签" /></label><button class="filter-btn" type="button" data-toast="素材筛选结构页">' + icon("filter") + '</button></div><div class="tabs"><button class="pill active">全部</button><button class="pill">活动</button><button class="pill">产品</button><button class="pill">话术</button></div><section class="card detail-head"><div class="task-top"><div><h1 class="detail-title">新品预览小程序卡片</h1><div class="meta" style="margin-top:6px">可用于 1v1、1vN 或企微原生群发。</div></div><span class="badge">已就绪</span></div></section><section class="card detail-head"><div class="task-top"><div><h1 class="detail-title">到店邀约话术</h1><div class="meta" style="margin-top:6px">根据客户生命周期和偏好调整表达与利益点。</div></div><span class="badge">话术</span></div></section>'
      });
    }

    function transferPage() {
      return appShell({
        title: "客户转移",
        back: true,
        tab: "__tool",
        body: state.role === "frontline" ? '<div class="disabled-note">当前角色无客户转移权限。请切换到管理角色查看此结构页。</div>' : '<section class="card detail-head"><h1 class="detail-title">转移确认</h1><div class="kv-grid"><span>来源顾问</span><strong>顾问 A</strong><span>接收顾问</span><strong>顾问 B</strong><span>客户数量</span><strong>12 位</strong><span>失败处理</span><strong>权限或锁定客户需单独处理</strong></div></section><div class="sticky-actions"><button class="secondary" type="button" data-toast="已取消">取消</button><button class="primary" type="button" data-toast="转移已提交">确认转移</button></div>'
      });
    }

    function toolPanel() {
      if (!state.toolOpen) return "";
      const managerTool = state.role === "frontline" ? "" : toolCell("transfer", "客户转移", "users");
      const dashboardLabel = state.role === "frontline" ? "个人看板" : "管理看板";
      return '<div class="tool-mask" data-close-tool></div><section class="tool-panel"><strong>快捷工具 · ' + activeRoleLabel() + '</strong><div class="tool-grid">' + toolCell("content", "素材库", "bag") + toolCell("dashboard", dashboardLabel, "chart") + managerTool + '</div></section>';
    }

    function toolCell(route, label, iconName) {
      return '<button class="tool-cell" type="button" data-route="' + route + '">' + icon(iconName) + '<span>' + label + '</span></button>';
    }

    function render() {
      const pages = {
        home: homePage,
        clients: clientsPage,
        filter: filterPage,
        c360: c360Page,
        tasks: tasksPage,
        taskDetail: taskDetailPage,
        nativeBroadcast: nativeBroadcastPage,
        appointment: appointmentPage,
        apptDetail: appointmentDetailPage,
        apptNew: appointmentNewPage,
        dashboard: dashboardPage,
        staffPerformance: staffPerformancePage,
        content: contentPage,
        transfer: transferPage
      };
      const app = document.getElementById("app");
      app.innerHTML = (pages[state.route] || homePage)();
      bindAppEvents(app);
      mountIcons(document);
      syncControls();
      requestAnimationFrame(fitDesktopPhone);
    }

    function bindAppEvents(root) {
      root.querySelectorAll("[data-route]").forEach((button) => button.addEventListener("click", () => navigate(button.dataset.route)));
      root.querySelectorAll("[data-tab]").forEach((button) => button.addEventListener("click", () => goTab(button.dataset.tab)));
      root.querySelectorAll("[data-back]").forEach((button) => button.addEventListener("click", goBack));
      root.querySelectorAll("[data-client]").forEach((button) => button.addEventListener("click", () => navigate("c360", { client: button.dataset.client })));
      root.querySelectorAll("[data-task]").forEach((button) => button.addEventListener("click", () => navigate("taskDetail", { task: button.dataset.task })));
      root.querySelectorAll("[data-appt]").forEach((button) => button.addEventListener("click", () => { state.selectedAppointment = button.dataset.appt; navigate("apptDetail"); }));
      root.querySelectorAll("[data-toast]").forEach((button) => button.addEventListener("click", () => toast(button.dataset.toast)));
      root.querySelectorAll("[data-scope]").forEach((button) => button.addEventListener("click", () => { state.clientScope = button.dataset.scope; render(); }));
      root.querySelectorAll("[data-task-type]").forEach((button) => button.addEventListener("click", () => { state.taskType = button.dataset.taskType; render(); }));
      root.querySelectorAll("[data-filter-category]").forEach((button) => button.addEventListener("click", () => { state.filterCategory = button.dataset.filterCategory; render(); }));
      root.querySelectorAll("[data-filter-value]").forEach((button) => button.addEventListener("click", () => { state.filters[state.filterCategory] = button.dataset.filterValue; render(); }));
      root.querySelectorAll("[data-reset-filter]").forEach((button) => button.addEventListener("click", () => { state.filters = { level: "all", lifecycle: "all", contact: "all" }; render(); }));
      root.querySelectorAll("[data-manager-period]").forEach((button) => button.addEventListener("click", () => { state.managerPeriod = button.dataset.managerPeriod; render(); }));
      root.querySelectorAll("[data-staff-performance]").forEach((button) => button.addEventListener("click", () => { state.selectedStaff = button.dataset.staffPerformance; navigate("staffPerformance"); }));
      root.querySelectorAll("[data-close-tool]").forEach((button) => button.addEventListener("click", () => { state.toolOpen = false; render(); }));
      root.querySelectorAll("[data-native-send]").forEach((button) => button.addEventListener("click", () => { state.route = "taskDetail"; toast("群发已发送，任务结果已写回"); }));
      root.querySelectorAll("[data-journey-prev]").forEach((button) => button.addEventListener("click", journeyPrev));
      root.querySelectorAll("[data-journey-next]").forEach((button) => button.addEventListener("click", journeyNext));
      root.querySelectorAll("[data-journey-exit]").forEach((button) => button.addEventListener("click", exitJourney));
      const search = root.querySelector("#clientSearch");
      if (search) search.addEventListener("input", (event) => { state.query = event.target.value; render(); });
    }

    function syncControls() {
      const roleSelect = document.getElementById("roleSelect");
      if (roleSelect) {
        roleSelect.innerHTML = roles.map((role) => '<option value="' + role + '"' + (state.role === role ? " selected" : "") + '>' + PROJECT.roleLabels[role] + '</option>').join("");
        roleSelect.disabled = state.journeyMode && !!state.activeJourney;
      }
      const modeBtn = document.getElementById("modeBtn");
      if (modeBtn) modeBtn.textContent = "模式：" + (state.journeyMode ? "Journey 演示" : "自由浏览");
      const journeySelect = document.getElementById("journeySelect");
      if (journeySelect) {
        journeySelect.disabled = !state.journeyMode;
        journeySelect.innerHTML = '<option value="">选择 Journey</option>' + Object.entries(journeys).map(([id, journey]) => '<option value="' + id + '"' + (state.activeJourney === id ? " selected" : "") + '>' + journey.name + '</option>').join("");
      }
      const reset = document.getElementById("resetJourneyBtn");
      if (reset) reset.disabled = !state.journeyMode || !state.activeJourney;
    }

    function startJourneyStep() {
      const journey = journeys[state.activeJourney];
      if (!journey) return;
      const step = journey.steps[state.journeyStep] || journey.steps[0];
      state.role = journey.role;
      if (step.client) state.selectedClient = step.client;
      if (step.task) state.selectedTask = step.task;
      state.route = step.route;
      state.toolOpen = false;
      location.hash = state.route;
      render();
    }

    function journeyPrev() {
      if (state.journeyStep > 0) { state.journeyStep -= 1; startJourneyStep(); }
    }

    function journeyNext() {
      const journey = journeys[state.activeJourney];
      if (!journey) return;
      if (state.journeyStep < journey.steps.length - 1) {
        state.journeyStep += 1;
        startJourneyStep();
      } else {
        toast("Journey 已完成");
      }
    }

    function exitJourney() {
      state.journeyMode = false;
      state.activeJourney = "";
      state.journeyStep = 0;
      state.route = "home";
      render();
    }

    document.querySelectorAll("[data-route]").forEach((button) => button.addEventListener("click", () => navigate(button.dataset.route)));
    document.getElementById("roleSelect").addEventListener("change", (event) => {
      if (state.journeyMode && state.activeJourney) {
        toast("Journey 模式下角色由场景控制");
        syncControls();
        return;
      }
      state.role = event.target.value;
      render();
    });
    document.getElementById("modeBtn").addEventListener("click", () => {
      state.journeyMode = !state.journeyMode;
      if (!state.journeyMode) { state.activeJourney = ""; state.journeyStep = 0; }
      render();
    });
    document.getElementById("journeySelect").addEventListener("change", (event) => {
      state.activeJourney = event.target.value;
      state.journeyStep = 0;
      if (state.activeJourney) startJourneyStep();
      else render();
    });
    document.getElementById("resetJourneyBtn").addEventListener("click", () => {
      state.journeyStep = 0;
      if (state.activeJourney) startJourneyStep();
    });

    window.addEventListener("hashchange", () => {
      const next = location.hash.replace("#", "") || "home";
      if (next !== state.route) {
        state.route = next;
        render();
      }
    });
    window.addEventListener("resize", () => { detectViewportMode(); fitDesktopPhone(); });

    detectViewportMode();
    render();
  </script>
</body>
</html>

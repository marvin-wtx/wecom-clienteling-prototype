<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WeCom Clienteling Shell Kit</title>
  <style>
    :root {
      --phone-w: 390px;
      --phone-h: 844px;
      --top-h: 88px;
      --status-h: 38px;
      --tab-h: 64px;
      --desktop-phone-scale: 1;
      --stage: #e9edf2;
      --stage-ink: #15202d;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-raised: #ffffff;
      --surface-soft: #f0f3f7;
      --line: #e0e5eb;
      --line-strong: #c8d0da;
      --text: #17212d;
      --muted: #667487;
      --subtle: #97a2b0;
      --brand-primary: #2357d6;
      --brand-primary-strong: #183f9f;
      --brand-accent: #b55d2a;
      --brand-on-primary: #ffffff;
      --brand-danger: #b42318;
      --brand: var(--brand-primary);
      --brand-strong: var(--brand-primary-strong);
      --accent: var(--brand-accent);
      --danger: var(--brand-danger);
      --shadow: 0 30px 70px rgba(28, 42, 58, .2), 0 6px 18px rgba(28, 42, 58, .1);
      --hairline: rgba(23, 33, 45, .1);
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; background: var(--stage); color: var(--text); }
    button, input, select { font: inherit; }
    button { border: 0; background: transparent; color: inherit; cursor: pointer; }
    svg { width: 1em; height: 1em; display: block; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* The external stage is deliberately quiet so the mini-program stays the focus. */
    .stage {
      min-height: 100vh;
      height: 100dvh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .36) 1px, transparent 1px) 0 0 / 56px 56px,
        linear-gradient(rgba(255, 255, 255, .36) 1px, transparent 1px) 0 0 / 56px 56px,
        var(--stage);
    }
    .stage-header, .stage-controls {
      width: min(920px, 100%);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .stage-mark { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .stage-mark::before { content: ""; width: 18px; height: 18px; border: 1px solid rgba(21, 32, 45, .45); border-radius: 5px; background: rgba(255, 255, 255, .6); box-shadow: inset 0 0 0 4px rgba(35, 87, 214, .1); }
    .stage-title strong { display: block; font-size: 13px; line-height: 1.3; letter-spacing: 0; }
    .stage-title span { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }
    .stage-controls {
      justify-content: center;
      flex-wrap: wrap;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, .72);
      border-radius: 7px;
      background: rgba(255, 255, 255, .48);
      box-shadow: 0 1px 2px rgba(21, 32, 45, .035);
    }
    .control-group { min-width: 0; display: flex; align-items: center; gap: 6px; }
    .control-label { color: var(--muted); font-size: 10px; font-weight: 700; white-space: nowrap; }
    .stage-btn, .stage-status, .select {
      min-height: 28px;
      border: 1px solid rgba(255, 255, 255, .72);
      border-radius: 6px;
      background: rgba(255, 255, 255, .58);
      box-shadow: 0 1px 2px rgba(21, 32, 45, .04);
      color: var(--stage-ink);
      padding: 0 9px;
      font-size: 11px;
    }
    .select { min-width: 0; max-width: 138px; color: var(--stage-ink); outline: 0; }
    .stage-btn:hover { border-color: var(--line-strong); background: var(--surface); }
    .stage-btn:disabled, .select:disabled { opacity: .48; cursor: not-allowed; }
    .stage-status { display: inline-flex; align-items: center; color: var(--muted); cursor: default; }
    .review-entry { flex-wrap: wrap; }
    .review-entry .stage-btn { display: inline-flex; align-items: center; gap: 4px; }
    .review-entry svg { font-size: 13px; }

    .phone-wrap { position: relative; flex: 0 0 auto; width: var(--phone-w); height: var(--phone-h); min-height: 0; }
    .phone {
      position: absolute;
      left: 50%; top: 0;
      width: var(--phone-w); height: var(--phone-h);
      transform: translateX(-50%) scale(var(--desktop-phone-scale));
      transform-origin: top center;
      border: 1px solid rgba(18, 29, 42, .72);
      border-radius: 40px;
      overflow: hidden;
      background: var(--bg);
      box-shadow: var(--shadow);
    }
    .phone::before {
      content: "";
      position: absolute;
      z-index: 16;
      left: 50%; top: 0;
      width: 112px; height: 23px;
      transform: translateX(-50%);
      border-radius: 0 0 15px 15px;
      background: #111820;
      pointer-events: none;
    }
    .screen { position: absolute; inset: 0; overflow: hidden; border-radius: 39px; background: var(--bg); }
    .statusbar {
      position: absolute;
      z-index: 15;
      top: 0; left: 0; right: 0;
      height: var(--status-h);
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text);
      font-size: 14px;
      font-weight: 760;
      pointer-events: none;
    }
    .status-network { font-size: 14px; font-weight: 760; letter-spacing: 0; }

    .app-page { position: relative; height: 100%; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .wx-nav {
      position: relative;
      z-index: 3;
      flex: 0 0 auto;
      height: var(--top-h);
      background: rgba(255, 255, 255, .86);
      border-bottom: 1px solid var(--hairline);
      backdrop-filter: blur(20px) saturate(130%);
    }
    .wx-nav-left {
      position: absolute;
      z-index: 1;
      top: var(--status-h); left: 0;
      width: 72px; height: calc(var(--top-h) - var(--status-h));
      display: flex;
      align-items: center;
      padding-left: 25px;
      color: var(--text);
    }
    .wx-nav-left::before { content: ""; width: 9px; height: 9px; border-left: 1.7px solid currentColor; border-bottom: 1.7px solid currentColor; transform: rotate(45deg); }
    .wx-nav-left.placeholder { visibility: hidden; }
    .wx-nav-title {
      position: absolute;
      top: var(--status-h); left: 50%;
      width: calc(100% - 244px); max-width: 196px;
      height: calc(var(--top-h) - var(--status-h));
      transform: translateX(-50%);
      overflow: hidden;
      color: var(--text);
      font-size: 16px; line-height: calc(var(--top-h) - var(--status-h)); font-weight: 730;
      letter-spacing: 0; text-align: center; text-overflow: ellipsis; white-space: nowrap;
      pointer-events: none;
    }
    .wx-nav > .wx-capsule { position: absolute; z-index: 1; right: 8px; top: calc(var(--status-h) + (var(--top-h) - var(--status-h)) / 2); transform: translateY(-50%); }
    .wx-capsule {
      width: 88px; height: 32px;
      display: flex; align-items: center;
      padding: 0 10px;
      border: .5px solid rgba(23, 33, 45, .12); border-radius: 16px;
      background: rgba(255, 255, 255, .84);
      box-shadow: 0 1px 1px rgba(23, 33, 45, .03);
    }
    .wx-capsule-dot, .wx-capsule-circle { position: relative; flex: 1; height: 32px; display: grid; place-items: center; }
    .wx-capsule-dot::before { content: ""; width: 12px; height: 4px; background: radial-gradient(circle 1.5px at 50% 50%, #111820 100%, transparent 100%); background-size: 4px 4px; background-repeat: repeat-x; }
    .wx-capsule-line { width: 1px; height: 17px; flex-shrink: 0; background: rgba(23, 33, 45, .12); }
    .wx-capsule-circle::before { content: ""; width: 16px; height: 16px; border: 1.5px solid #111820; border-radius: 50%; }
    .wx-capsule-circle::after { content: ""; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; transform: translate(-50%, -50%); border-radius: 50%; background: #111820; }

    .body { position: relative; flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 16px 14px calc(var(--tab-h) + env(safe-area-inset-bottom) + 18px); scrollbar-width: none; }
    .body::-webkit-scrollbar { display: none; }
    .body.no-tab { padding-bottom: calc(env(safe-area-inset-bottom) + 18px); }
    .app-page.has-actions .body { padding-bottom: calc(var(--tab-h) + 92px + env(safe-area-inset-bottom)); }
    .app-page.has-actions .body.no-tab { padding-bottom: calc(108px + env(safe-area-inset-bottom)); }

    .tabbar {
      position: absolute;
      z-index: 24;
      right: 0; bottom: 0; left: 0;
      min-height: var(--tab-h);
      padding-bottom: env(safe-area-inset-bottom);
      display: grid;
      grid-template-columns: repeat(var(--tab-count, 4), minmax(0, 1fr));
      border-top: 1px solid var(--hairline);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(20px) saturate(130%);
    }
    .tab { min-width: 0; display: grid; place-items: center; align-content: center; gap: 4px; color: var(--muted); font-size: 10px; font-weight: 680; }
    .tab.active { color: var(--brand-strong); }
    .tab .tab-ic { position: relative; font-size: 20px; }
    .tab.active .tab-ic::after { content: ""; position: absolute; bottom: -4px; left: 50%; width: 4px; height: 4px; transform: translateX(-50%); border-radius: 50%; background: currentColor; }
    .tab.center .tab-ic { width: 37px; height: 37px; display: grid; place-items: center; border: 1px solid rgba(255, 255, 255, .48); border-radius: 9px; color: var(--brand-on-primary); background: var(--brand); box-shadow: 0 6px 14px color-mix(in srgb, var(--brand) 24%, transparent); }
    .tab.center.active .tab-ic::after { display: none; }

    /* Page primitives are optional starting points, not a prescribed information architecture. */
    .page-stack { display: grid; gap: 14px; }
    .section-kicker { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 11px; font-weight: 760; letter-spacing: 0; text-transform: uppercase; }
    .section-kicker button, .inline-action { color: var(--brand-strong); font-size: 12px; font-weight: 720; }
    .surface-panel { border: 1px solid var(--line); border-radius: 7px; background: var(--surface-raised); box-shadow: 0 2px 7px rgba(23, 33, 45, .025); }
    .surface-panel.padded { padding: 14px; }
    .split-note { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: start; gap: 12px; padding: 13px 14px; }
    .split-note strong { display: block; font-size: 15px; line-height: 1.35; }
    .split-note p, .meta { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .metric-strip { display: grid; grid-template-columns: repeat(var(--metric-count, 3), minmax(0, 1fr)); }
    .metric { min-width: 0; padding: 13px 12px; border-right: 1px solid var(--line); }
    .metric:last-child { border-right: 0; }
    .metric strong { display: block; margin-top: 5px; font-size: 20px; line-height: 1.1; letter-spacing: 0; }
    .metric span { display: block; color: var(--muted); font-size: 11px; line-height: 1.3; }
    .compact-chip { display: inline-flex; align-items: center; min-height: 23px; padding: 3px 7px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface-soft); color: var(--brand-strong); font-size: 11px; font-weight: 700; }
    .toolbar { display: flex; gap: 8px; }
    .search { flex: 1; min-width: 0; height: 38px; display: flex; align-items: center; gap: 8px; padding: 0 11px; border: 1px solid var(--line); border-radius: 7px; background: rgba(255, 255, 255, .72); color: var(--muted); }
    .search input { min-width: 0; flex: 1; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 13px; }
    .icon-btn, .filter-btn { width: 38px; height: 38px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 7px; background: var(--surface); color: var(--muted); }
    .list-row { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 11px; align-items: center; padding: 13px 14px; border-bottom: 1px solid var(--line); text-align: left; width: 100%; }
    .list-row:last-child { border-bottom: 0; }
    .row-mark { width: 30px; height: 30px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 6px; color: var(--brand-strong); background: var(--surface-soft); }
    .row-copy { min-width: 0; }
    .row-copy strong { display: block; overflow: hidden; font-size: 13px; line-height: 1.35; text-overflow: ellipsis; white-space: nowrap; }
    .row-copy span { display: block; overflow: hidden; margin-top: 3px; color: var(--muted); font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
    .row-meta { color: var(--subtle); font-size: 11px; white-space: nowrap; }
    .media-frame { min-height: 116px; overflow: hidden; position: relative; border-radius: 7px; background: linear-gradient(145deg, #17212d, #3b4c60); color: #fff; }
    .media-frame::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 38%, rgba(13, 21, 30, .76)); pointer-events: none; }
    .media-frame > * { position: relative; z-index: 1; }
    .primary, .secondary { min-height: 42px; padding: 0 14px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; border-radius: 7px; font-size: 13px; font-weight: 760; }
    .primary { flex: 1; background: var(--brand); color: var(--brand-on-primary); box-shadow: 0 6px 14px color-mix(in srgb, var(--brand) 20%, transparent); }
    .secondary { border: 1px solid var(--line); background: var(--surface); color: var(--brand-strong); }
    .sticky-actions { position: absolute; z-index: 26; right: 0; bottom: 0; left: 0; display: flex; gap: 10px; margin: 0; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--hairline); background: rgba(247, 248, 250, .9); backdrop-filter: blur(20px); }
    .app-page.has-tabbar .sticky-actions { bottom: var(--tab-h); }

    .journey-hud { position: absolute; z-index: 30; right: 12px; bottom: calc(var(--tab-h) + 10px); left: 12px; display: none; padding: 10px 11px; border: 1px solid rgba(255, 255, 255, .18); border-radius: 7px; background: rgba(23, 33, 45, .94); box-shadow: 0 10px 30px rgba(23, 33, 45, .18); color: #fff; }
    .journey-hud.active { display: block; }
    .journey-hud strong { display: block; font-size: 12px; }
    .journey-hud span { display: block; margin-top: 4px; color: rgba(255, 255, 255, .76); font-size: 12px; line-height: 1.4; }
    .journey-hud .hud-actions { display: flex; gap: 6px; margin-top: 9px; }
    .journey-hud button { min-height: 28px; padding: 0 9px; border: 1px solid rgba(255, 255, 255, .5); border-radius: 5px; color: #fff; font-size: 11px; }
    .journey-hud .primary-hud { border-color: #fff; background: #fff; color: #17212d; }

    /* Native WeCom handoffs stay separate from branded page primitives. */
    .native-send-wrap { min-height: 100%; background: #f6f6f6; }
    .native-brand-tile { display: flex; align-items: center; gap: 10px; padding: 13px; border: 1px solid #e7e7e7; border-radius: 6px; background: #fff; color: #303030; }
    .native-brand-tile::before { content: ""; width: 28px; height: 28px; border-radius: 4px; background: #07c160; }

    .kit-intro { padding: 4px 2px 2px; }
    .kit-eyebrow { margin: 0; color: var(--brand-strong); font-size: 10px; font-weight: 800; letter-spacing: .08em; }
    .kit-intro h1 { max-width: 260px; margin: 9px 0 0; font-size: 26px; line-height: 1.14; letter-spacing: 0; }
    .kit-intro p { margin: 10px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .kit-sample { margin-top: 18px; }
    .kit-sample .media-frame { padding: 15px; }
    .kit-sample .media-frame span { display: block; color: rgba(255, 255, 255, .72); font-size: 10px; font-weight: 750; letter-spacing: .08em; }
    .kit-sample .media-frame strong { display: block; max-width: 210px; margin-top: 30px; font-size: 18px; line-height: 1.25; }
    .kit-sample .surface-panel { margin-top: 10px; }
    .kit-hint { margin-top: 16px; color: var(--subtle); font-size: 11px; line-height: 1.5; }

    @media (max-width: 620px), (max-height: 760px) {
      body.mobile { background: var(--bg); }
      body.mobile .stage { min-height: 100dvh; height: 100dvh; padding: 0; display: block; background: var(--bg); }
      body.mobile .stage-header, body.mobile .stage-controls { display: none; }
      body.mobile .phone-wrap { width: 100%; height: 100dvh; }
      body.mobile .phone { position: fixed; inset: 0; width: 100%; height: 100dvh; transform: none; border: 0; border-radius: 0; box-shadow: none; }
      body.mobile .phone::before { display: none; }
      body.mobile .screen { border-radius: 0; }
    }
  </style>
</head>
<body>
  <main class="stage" data-shell-kit="wecom-clienteling-v3">
    <header class="stage-header">
      <div class="stage-mark">
        <div class="stage-title">
          <strong>WeCom Clienteling Shell Kit</strong>
          <span>Protected frame and page primitives</span>
        </div>
      </div>
      <span class="stage-status">390 x 844</span>
    </header>
    <section class="stage-controls" id="stageControls" aria-label="Prototype review controls"></section>
    <div class="phone-wrap">
      <section class="phone">
        <div class="screen">
          <div class="statusbar"><span>9:41</span><span class="status-network">5G</span></div>
          <div id="app"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    /*
     * This file is a shell kit, not a client project or a reusable home-page template.
     * Preserve the frame/helpers. Replace renderKitPreview with project data, routes, pages,
     * navigation, and interactions before delivering a prototype.
     */
    const shellState = { route: "kit", activeTab: "", tabs: [] };
    const kitReviewConfig = {
      labels: {
        role: "Role",
        mode: "Mode",
        entry: "Entry",
        browse: "Free browse",
        journey: "Journey demo",
        chooseJourney: "Configure journeys",
        configureRole: "Configure roles",
        reset: "Reset"
      },
      roles: [],
      activeRole: "",
      mode: "browse",
      journeys: [],
      activeJourney: "",
      entries: []
    };
    let reviewConfig = { ...kitReviewConfig };

    function icon(name) {
      const paths = {
        grid: '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
        users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
        list: '<path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/>',
        calendar: '<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
        plus: '<path d="M12 5v14M5 12h14"/>',
        chevron: '<path d="m9 18 6-6-6-6"/>',
        search: '<circle cx="11" cy="11" r="6"/><path d="m20 20-4-4"/>',
        tune: '<path d="M4 7h16M7 7v0M4 17h16M17 17v0"/>',
        arrow: '<path d="m15 18-6-6 6-6"/>'
      };
      return `<svg viewBox="0 0 24 24" aria-hidden="true">${paths[name] || paths.grid}</svg>`;
    }

    function wecomCapsule() {
      return '<div class="wx-capsule" aria-label="WeCom controls"><span class="wx-capsule-dot"></span><i class="wx-capsule-line"></i><span class="wx-capsule-circle"></span></div>';
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, (character) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      })[character]);
    }

    function optionMarkup(items, selected, fallback) {
      if (!items.length) return `<option value="">${escapeHtml(fallback)}</option>`;
      return items.map((item) => `<option value="${escapeHtml(item.id)}"${item.id === selected ? ' selected' : ''}>${escapeHtml(item.label)}</option>`).join('');
    }

    function reviewControls(config) {
      const labels = { ...kitReviewConfig.labels, ...(config.labels || {}) };
      const roles = Array.isArray(config.roles) ? config.roles : [];
      const journeys = Array.isArray(config.journeys) ? config.journeys : [];
      const entries = Array.isArray(config.entries) ? config.entries : [];
      const mode = config.mode === 'journey' ? 'journey' : 'browse';
      const roleDisabled = roles.length < 2 || mode === 'journey';
      const journeyDisabled = mode !== 'journey' || !journeys.length;
      return `
        <div class="control-group">
          <span class="control-label">${escapeHtml(labels.role)}</span>
          <select class="select" id="roleSelect" data-review-control="role" aria-label="${escapeHtml(labels.role)}"${roleDisabled ? ' disabled' : ''}>${optionMarkup(roles, config.activeRole, labels.configureRole)}</select>
        </div>
        <div class="control-group">
          <button class="stage-btn" id="modeBtn" type="button" data-review-control="mode">${escapeHtml(labels.mode)}: ${escapeHtml(mode === 'journey' ? labels.journey : labels.browse)}</button>
          <select class="select" id="journeySelect" data-review-control="journey" aria-label="${escapeHtml(labels.journey)}"${journeyDisabled ? ' disabled' : ''}>${optionMarkup(journeys, config.activeJourney, labels.chooseJourney)}</select>
          <button class="stage-btn" type="button" data-review-control="journey-reset"${mode !== 'journey' || !config.activeJourney ? ' disabled' : ''}>${escapeHtml(labels.reset)}</button>
        </div>
        ${entries.length ? `<div class="control-group review-entry">
          <span class="control-label">${escapeHtml(labels.entry)}</span>
          ${entries.map((entry) => `<button class="stage-btn" type="button" data-review-entry="${escapeHtml(entry.id)}"><span>${icon(entry.icon || 'grid')}</span>${escapeHtml(entry.label)}</button>`).join('')}
        </div>` : ''}
        <div class="control-group">
          <button class="stage-btn" type="button" data-stage-action="fit">Fit</button>
        </div>`;
    }

    function mountReviewControls(config = kitReviewConfig) {
      reviewConfig = {
        ...kitReviewConfig,
        ...config,
        labels: { ...kitReviewConfig.labels, ...(config.labels || {}) }
      };
      document.getElementById('stageControls').innerHTML = reviewControls(reviewConfig);
    }

    function emitReviewChange(type, value = '') {
      window.dispatchEvent(new CustomEvent('wecom-review-change', {
        detail: { type, value, config: reviewConfig }
      }));
    }

    function journeyHud({ journeyName, stepLabel, note, canGoPrevious = false, nextLabel = 'Next', labels = {} }) {
      if (!journeyName || !note) return '';
      const copy = { previous: 'Previous', exit: 'Exit', ...labels };
      return `<aside class="journey-hud active" aria-live="polite"><strong>${escapeHtml(journeyName)}${stepLabel ? ` · ${escapeHtml(stepLabel)}` : ''}</strong><span>${escapeHtml(note)}</span><div class="hud-actions"><button type="button" data-journey-action="previous"${canGoPrevious ? '' : ' disabled'}>${escapeHtml(copy.previous)}</button><button class="primary-hud" type="button" data-journey-action="next">${escapeHtml(nextLabel)}</button><button type="button" data-journey-action="exit">${escapeHtml(copy.exit)}</button></div></aside>`;
    }

    function tabbar(items, activeTab) {
      if (!items.length) return '';
      const tabs = items.map((item) => {
        const active = item.id === activeTab ? ' active' : '';
        const center = item.center ? ' center' : '';
        return `<button class="tab${active}${center}" type="button" data-route="${item.id}"><span class="tab-ic">${icon(item.icon)}</span><span>${item.label}</span></button>`;
      }).join('');
      return `<nav class="tabbar" style="--tab-count:${items.length}" aria-label="Primary navigation">${tabs}</nav>`;
    }

    function appShell({ title, back = false, body = '', tabs = [], activeTab = '', actions = '', journey = '' }) {
      const hasTabbar = tabs.length > 0;
      const pageClass = `${hasTabbar ? ' has-tabbar' : ''}${actions ? ' has-actions' : ''}`;
      return `
        <article class="app-page${pageClass}">
          <header class="wx-nav">
            <button class="wx-nav-left${back ? '' : ' placeholder'}" type="button" data-back aria-label="Back"></button>
            <div class="wx-nav-title">${title}</div>
            ${wecomCapsule()}
          </header>
          <div class="body${hasTabbar ? '' : ' no-tab'}">${body}</div>
          ${actions ? `<footer class="sticky-actions">${actions}</footer>` : ''}
          ${tabbar(tabs, activeTab)}
          ${journey}
        </article>`;
    }

    function nativeSendFrame({ title = '新建群发', body = '', footer = '' }) {
      return `
        <article class="app-page native-send-wrap">
          <header class="wx-nav"><button class="wx-nav-left" type="button" data-back aria-label="Back"></button><div class="wx-nav-title">${title}</div>${wecomCapsule()}</header>
          <div class="body no-tab">${body}</div>
          ${footer ? `<footer class="sticky-actions">${footer}</footer>` : ''}
        </article>`;
    }

    function renderKitPreview() {
      const body = `
        <div class="page-stack">
          <section class="kit-intro">
            <p class="kit-eyebrow">PROJECT CANVAS</p>
            <h1>Start with the operating model.</h1>
            <p>This preview contains no clienteling IA, no default tabs, and no business data.</p>
          </section>
          <section class="kit-sample" aria-label="Shell primitive preview">
            <div class="media-frame"><span>PAGE LAYER</span><strong>Build the visual anchor only after the work surface is clear.</strong></div>
            <div class="surface-panel metric-strip" style="--metric-count:3">
              <div class="metric"><span>Surface</span><strong>01</strong></div>
              <div class="metric"><span>Density</span><strong>02</strong></div>
              <div class="metric"><span>Action</span><strong>03</strong></div>
            </div>
          </section>
          <p class="kit-hint">Keep the frame and helpers. Replace this preview with a project-specific route map and connected data.</p>
        </div>`;
      return appShell({ title: 'Shell Kit', body });
    }

    function render() {
      mountReviewControls(kitReviewConfig);
      document.getElementById('app').innerHTML = renderKitPreview();
      fitDesktopPhone();
    }

    function detectViewportMode() {
      const requested = new URLSearchParams(window.location.search).get('view');
      return requested === 'mobile' || (!requested && window.matchMedia('(max-width: 620px), (max-height: 760px)').matches) ? 'mobile' : 'desktop';
    }

    function fitDesktopPhone() {
      const mobile = detectViewportMode() === 'mobile';
      document.body.classList.toggle('mobile', mobile);
      if (mobile) return;
      const availableHeight = Math.max(420, window.innerHeight - 94);
      const availableWidth = Math.max(320, window.innerWidth - 32);
      const scale = Math.min(1, availableHeight / 844, availableWidth / 390);
      document.documentElement.style.setProperty('--desktop-phone-scale', scale.toFixed(3));
      document.querySelector('.phone-wrap').style.height = `${844 * scale}px`;
    }

    document.addEventListener('click', (event) => {
      const stageAction = event.target.closest('[data-stage-action]')?.dataset.stageAction;
      if (stageAction === 'fit') fitDesktopPhone();
      const reviewControl = event.target.closest('[data-review-control]')?.dataset.reviewControl;
      if (reviewControl === 'mode') {
        reviewConfig = { ...reviewConfig, mode: reviewConfig.mode === 'journey' ? 'browse' : 'journey' };
        if (reviewConfig.mode === 'browse') reviewConfig.activeJourney = '';
        mountReviewControls(reviewConfig);
        emitReviewChange('mode', reviewConfig.mode);
      }
      if (reviewControl === 'journey-reset') emitReviewChange('journey-reset', reviewConfig.activeJourney);
      const entry = event.target.closest('[data-review-entry]')?.dataset.reviewEntry;
      if (entry) emitReviewChange('entry', entry);
      const journeyAction = event.target.closest('[data-journey-action]')?.dataset.journeyAction;
      if (journeyAction) emitReviewChange(`journey-${journeyAction}`, reviewConfig.activeJourney);
    });
    document.addEventListener('change', (event) => {
      const control = event.target.dataset.reviewControl;
      if (control === 'role') {
        reviewConfig = { ...reviewConfig, activeRole: event.target.value };
        emitReviewChange('role', event.target.value);
      }
      if (control === 'journey') {
        reviewConfig = { ...reviewConfig, activeJourney: event.target.value };
        emitReviewChange('journey', event.target.value);
      }
    });
    window.addEventListener('resize', fitDesktopPhone);
    render();
  </script>
</body>
</html>

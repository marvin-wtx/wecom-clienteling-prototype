interface:
  display_name: WeCom Clienteling Prototype
  short_description: Build credible, operable WeCom clienteling prototypes.
  default_prompt: "Use $wecom-clienteling-prototype V4.0. Confirm role, modules, second-level pages, primary Journey, and depth before files. Use common retail structures and visibly mock values without claiming brand facts. Build and browser-test the neutral mobile product first. Then run one design intake, apply the component UX foundation to representative screens, obtain user visual acceptance, extend the accepted brand design, and only then add review controls outside the phone."
